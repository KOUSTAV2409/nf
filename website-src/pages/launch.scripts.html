  <script>
    const btn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');

    btn.addEventListener('click', () => {
      overlay.style.display = 'none';
      startCinematic();
    });

    function startCinematic() {
      const tl = gsap.timeline();

      tl.to("#s1", { autoAlpha: 1, duration: 1.5 })
        .to("#s1", { autoAlpha: 0, duration: 1, delay: 2 });

      tl.to("#s2", { autoAlpha: 1, duration: 1 })
        .call(() => typeWriter("nf 'the next big idea'", "type-1"))
        .to("#s2", { autoAlpha: 0, duration: 1, delay: 3 });

      tl.to("#s3", { autoAlpha: 1, scale: 1.1, duration: 1.5 })
        .to("#s3", { autoAlpha: 0, duration: 1, delay: 2 });

      tl.to("#s4", { autoAlpha: 1, y: -20, duration: 1.5 })
        .to("#s4", { autoAlpha: 0, duration: 1, delay: 3 });

      tl.to("#s5", { autoAlpha: 1, duration: 1.5 })
        .to("#s5", { autoAlpha: 0, duration: 1, delay: 2 });

      tl.fromTo("#s6", { scale: 0.8 }, { autoAlpha: 1, scale: 1, duration: 2, ease: "power4.out" });
    }

    document.addEventListener('click', (e) => {
      if (e.target.id === 'replay-btn') {
        location.reload();
      }
    });

    function typeWriter(text, id) {
      let i = 0;
      const el = document.getElementById(id);
      el.innerHTML = "";
      function type() {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
          setTimeout(type, 100);
        }
      }
      type();
    }
  </script>
